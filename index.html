<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabinado | Launching Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0a0f1c, #111827);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* 🔥 BACKGROUND LOGO (FIXED) */
    body::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      transform: translate(-50%, -50%);
      background: url('Logo.png') no-repeat center; /* ✅ FIXED */
      background-size: contain;
      opacity: 0.25; /* visible */
      z-index: 0;
      animation: floatLogo 6s ease-in-out infinite;
    }

    /* ✨ Glow Effect */
    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(250,204,21,0.25), transparent 70%);
      filter: blur(60px);
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }

    .container {
      max-width: 700px;
      padding: 40px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(8px);
      border-radius: 12px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .logo {
      font-size: 42px;
      font-weight: 600;
      color: #facc15;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #f9fafb;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: #facc15;
      margin: 20px auto;
      border-radius: 5px;
    }

    p {
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .email-box {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    input {
      padding: 12px;
      border: none;
      border-radius: 6px 0 0 6px;
      outline: none;
      width: 60%;
      max-width: 250px;
    }

    button {
      padding: 12px 18px;
      border: none;
      background: #facc15;
      color: #000;
      font-weight: 600;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #eab308;
    }

    .contact {
      margin-top: 25px;
      font-size: 14px;
      color: #6b7280;
    }

    .contact a {
      color: #facc15;
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #6b7280;
    }

    /* 🎯 Animations */
    @keyframes floatLogo {
      0% { transform: translate(-50%, -50%) translateY(0px); }
      50% { transform: translate(-50%, -50%) translateY(-25px); }
      100% { transform: translate(-50%, -50%) translateY(0px); }
    }

    @keyframes glowPulse {
      0% { opacity: 0.2; }
      50% { opacity: 0.5; }
      100% { opacity: 0.2; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      .logo { font-size: 32px; }
      input { width: 50%; }
    }

  </style>

</head>

<body>
