<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabinado | Launching Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #1a1205 0%, #000000 70%);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* 🔥 BACKGROUND LOGO */
    body::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 700px;
      height: 700px;
      transform: translate(-50%, -50%);
      background: url('Logo.png') no-repeat center;
      background-size: contain;
      opacity: 0.15;
      z-index: 0;
      animation: floatLogo 6s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 200, 50, 0.3));
    }

    /* ✨ GOLD GLOW */
    body::after {
      content: "";
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(255, 200, 50, 0.2), transparent 70%);
      filter: blur(80px);
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }

    /* ✅ FIXED CONTAINER */
    .container {
      max-width: 600px;
      padding: 30px;
      position: relative;
      z-index: 1;

      /* 🔥 DARK GLASS EFFECT (FIXED) */
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      backdrop-filter: blur(6px);

      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 0 40px rgba(255, 200, 50, 0.08);

      animation: fadeIn 1.5s ease-in-out;
    }

    .logo {
      font-size: 40px;
      font-weight: 600;
      color: #ffd700;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 15px;
      color: #ffffff;
    }

    .divider {
      width: 70px;
      height: 2px;
      background: #ffd700;
      margin: 15px auto;
    }

    p {
      font-size: 15px;
      color: #a1a1aa;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .email-box {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    input {
      padding: 10px;
      border: none;
      border-radius: 6px 0 0 6px;
      outline: none;
      width: 60%;
      background: #111;
      color: #fff;
    }

    button {
      padding: 10px 16px;
      border: none;
      background: #ffd700;
      color: #000;
      font-weight: 600;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
    }

    button:hover {
      background: #facc15;
    }

    .contact {
      margin-top: 20px;
      font-size: 14px;
      color: #9ca3af;
    }

    .contact a {
      color: #ffd700;
      text-decoration: none;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #6b7280;
    }

    /* Animations */
    @keyframes floatLogo {
      0% { transform: translate(-50%, -50%) translateY(0px); }
      50% { transform: translate(-50%, -50%) translateY(-20px); }
      100% { transform: translate(-50%, -50%) translateY(0px); }
    }

    @keyframes glowPulse {
      0% { opacity: 0.2; }
      50% { opacity: 0.5; }
      100% { opacity: 0.2; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body::before {
        width: 400px;
        height: 400px;
      }
    }

  </style>

</head>

<body>
