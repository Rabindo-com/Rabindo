<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabinado</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 1000;
}

nav h2 {
  color: #ffd700;
}

nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
}

nav ul li a {
  text-decoration: none;
  color: #ccc;
}

nav ul li a:hover {
  color: #ffd700;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 900px;
  height: 900px;
  background: url('Logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.06;
  animation: float 6s ease-in-out infinite;
}

.hero::after {
  content: "";
  position: absolute;
  width: 1000px;
  height: 1000px;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
  filter: blur(120px);
}

.hero h1 {
  font-size: 60px;
  color: #ffd700;
  z-index: 1;
}

.hero p {
  margin-top: 20px;
  color: #aaa;
  z-index: 1;
}

/* SECTIONS */
section {
  padding: 100px 20px;
  text-align: center;
}

.alt {
  background: #0a0a0a;
}

h2 {
  color: #ffd700;
  margin-bottom: 20px;
}

.services {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 250px;
  padding: 25px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,215,0,0.15);
}

.card:hover {
  transform: translateY(-10px);
}

/* CONTACT */
input, textarea {
  width: 300px;
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #ffd700;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
}

footer {
  padding: 20px;
  text-align: center;
  color: #777;
}

/* ANIMATION */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-25px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<nav>
  <h2>Rabinado</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="home" class="hero">
  <div>
    <h1>Rabinado</h1>
    <p>Building innovative solutions with premium technology.</p>
  </div>
</section>

<section id="about">
  <h2>About</h2>
  <p>We deliver cloud, DevOps and modern digital solutions.</p>
</section>

<section id="services" class="alt">
  <h2>Services</h2>
  <div class="services">
    <div class="card">Cloud</div>
    <div class="card">DevOps</div>
    <div class="card">Web</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <input placeholder="Name"><br>
  <input placeholder="Email"><br>
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
  <p>Email: Rabinadopvtltd@gmail.com</p>
</section>

<footer>
  © 2026 Rabinado
</footer>

</body>
</html>
